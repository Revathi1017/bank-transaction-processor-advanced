spring.application.name=transprocessor

# H2 Database
# spring.datasource.url=jdbc:h2:mem:bankdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=admin
# spring.datasource.password=admin

# H2 Console
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/bankdb?TimeZone=UTC
spring.datasource.username=bankuser
spring.datasource.password=bankpass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ? let Hibernate create tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Logging
# Logging Pattern - Console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n

# Logging Pattern - File
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n

# Log File Location
logging.file.name=logs/payment-service.log

# Log Levels
logging.level.root=INFO
logging.level.com.transaction.transprocessor=INFO
logging.level.org.flywaydb=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE